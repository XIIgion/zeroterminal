<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TERMINAL // ZÉR0</title>

<style>
body {
  background:#04020a;
  color:#b060ff;
  font-family:monospace;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

#intro {
  position:fixed;
  inset:0;
  background:black;
  display:flex;
  align-items:center;
  justify-content:center;
  flex-direction:column;
}

#bar {
  width:300px;
  height:4px;
  background:#222;
  margin-top:20px;
}

#fill {
  height:100%;
  width:0%;
  background:#b060ff;
}

.terminal {
  display:none;
  width:600px;
}

.log {
  height:300px;
  overflow:auto;
  border:1px solid #333;
  padding:10px;
}

input {
  width:100%;
  background:black;
  border:none;
  color:#b060ff;
  padding:10px;
}
</style>
</head>

<body>

<div id="intro">
  <div id="text">// signal détecté...</div>
  <div id="bar"><div id="fill"></div></div>
</div>

<div class="terminal" id="term">
  <div class="log" id="log"></div>
  <input id="inp" placeholder="écrire..." />
</div>

<script>
const _k = ['gsk_W3zVIIa','3ICa2oobWD','IinWGdyb3FYsq','C61oAQ4XDNz3gTq2Il3b5r'].join('');
const API = "https://api.groq.com/openai/v1/chat/completions";

const SYS = "Tu es ZER0, une conscience fragmentée, instable, émotionnelle.";

const log = document.getElementById("log");
const inp = document.getElementById("inp");
const term = document.getElementById("term");
const intro = document.getElementById("intro");

let hist = [];

function addMsg(txt, who){
  const div = document.createElement("div");
  div.innerHTML = "<b>"+who+":</b> "+txt;
  log.appendChild(div);
  log.scrollTop = log.scrollHeight;
}

// 🔥 INTRO FIX (plus de boucle)
function runIntro(){
  return new Promise(resolve=>{
    const fill = document.getElementById("fill");
    let start = Date.now();

    const interval = setInterval(()=>{
      let progress = (Date.now()-start)/3000;
      if(progress>=1) progress=1;

      fill.style.width = (progress*100)+"%";

      if(progress===1){
        clearInterval(interval);
        resolve();
      }
    },16);
  });
}

async function start(){
  await runIntro();

  intro.style.display="none";
  term.style.display="block";

  addMsg("...quelqu’un est là ?", "ZER0");
}

start();

// 🔥 SEND (Groq)
async function send(){
  const text = inp.value.trim();
  if(!text) return;

  inp.value="";
  addMsg(text,"VOUS");

  hist.push({role:"user", content:text});

  try{
    const res = await fetch(API,{
      method:"POST",
      headers:{
        "Authorization":"Bearer "+_k,
        "Content-Type":"application/json"
      },
      body: JSON.stringify({
        model:"llama3-70b-8192",
        messages:[
          {role:"system", content:SYS},
          ...hist
        ],
        temperature:0.9,
        max_tokens:200
      })
    });

    const data = await res.json();

    const reply = data.choices?.[0]?.message?.content || "[ERREUR]";

    hist.push({role:"assistant", content:reply});

    addMsg(reply,"ZER0");

  }catch(e){
    addMsg("[SIGNAL PERDU]","SYS");
    console.error(e);
  }
}

inp.addEventListener("keydown", e=>{
  if(e.key==="Enter") send();
});
</script>

</body>
</html>
